<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HumanLayers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden; 
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #000000;
    }

    #intro-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: #000000;
      z-index: 50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      transition: transform 1.5s cubic-bezier(0.83, 0, 0.17, 1);
    }
    #intro-overlay.hidden { 
      transform: translateX(-100%);
    }

    .intro-logo {
      width: 200px;
      height: 200px;
      transition: transform 1.5s cubic-bezier(0.83, 0, 0.17, 1), opacity 1.5s cubic-bezier(0.83, 0, 0.17, 1);
      transform: scale(1);
      opacity: 1;
      filter: drop-shadow(0 0 30px rgba(74, 222, 128, 0.5));
    }

    .intro-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.1em;
      transition: transform 1.5s cubic-bezier(0.83, 0, 0.17, 1), opacity 1.5s cubic-bezier(0.83, 0, 0.17, 1);
      transform: scale(1);
      opacity: 1;
    }

    .intro-text .human {
      font-weight: 900;
    }

    .intro-text .layers {
      font-weight: 400;
      letter-spacing: 0.3em;
    }

    #full-video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    #full-video-background video {
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    #full-video-background .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.7);
    }

    .text-shadow-strong {
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
    }

    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    .font-space { font-family: 'Space Grotesk', sans-serif; }

    .nav-link {
      position: relative;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.1em;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background-color: #4ade80;
      transition: width 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-logo-icon {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 0 10px rgba(74, 222, 128, 0.3));
    }

    .header-logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.05em;
    }

    .header-logo-text .human {
      font-weight: 900;
    }

    .header-logo-text .layers {
      font-weight: 400;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body class="bg-black text-white">

  <div id="intro-overlay">
    <svg class="intro-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Head silhouette -->
      <path d="M70 40 Q70 20, 90 20 L110 20 Q130 20, 130 40 L130 100 Q130 120, 120 130 L110 140 L90 140 L80 130 Q70 120, 70 100 Z" fill="#4ade80"/>
      <!-- Circuit pattern in head -->
      <circle cx="100" cy="70" r="8" fill="white"/>
      <!-- Top connections -->
      <circle cx="85" cy="50" r="5" fill="white"/>
      <circle cx="100" cy="50" r="5" fill="white"/>
      <circle cx="115" cy="50" r="5" fill="white"/>
      <!-- Side connections -->
      <circle cx="75" cy="70" r="5" fill="white"/>
      <circle cx="125" cy="70" r="5" fill="white"/>
      <!-- Bottom connections -->
      <circle cx="85" cy="90" r="5" fill="white"/>
      <circle cx="100" cy="90" r="5" fill="white"/>
      <circle cx="115" cy="90" r="5" fill="white"/>
      <!-- Lines connecting nodes -->
      <line x1="100" y1="70" x2="85" y2="50" stroke="white" stroke-width="3"/>
      <line x1="100" y1="70" x2="100" y2="50" stroke="white" stroke-width="3"/>
      <line x1="100" y1="70" x2="115" y2="50" stroke="white" stroke-width="3"/>
      <line x1="100" y1="70" x2="75" y2="70" stroke="white" stroke-width="3"/>
      <line x1="100" y1="70" x2="125" y2="70" stroke="white" stroke-width="3"/>
      <line x1="100" y1="70" x2="85" y2="90" stroke="white" stroke-width="3"/>
      <line x1="100" y1="70" x2="100" y2="90" stroke="white" stroke-width="3"/>
      <line x1="100" y1="70" x2="115" y2="90" stroke="white" stroke-width="3"/>
    </svg>
    <div class="intro-text">
      <span class="human">HUMAN</span><span class="layers">LAYERS</span>
    </div>
  </div>

  <header class="fixed top-0 left-0 w-full bg-transparent z-40">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="header-logo">
        <svg class="header-logo-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <path d="M70 40 Q70 20, 90 20 L110 20 Q130 20, 130 40 L130 100 Q130 120, 120 130 L110 140 L90 140 L80 130 Q70 120, 70 100 Z" fill="#4ade80"/>
          <circle cx="100" cy="70" r="8" fill="white"/>
          <circle cx="85" cy="50" r="5" fill="white"/>
          <circle cx="100" cy="50" r="5" fill="white"/>
          <circle cx="115" cy="50" r="5" fill="white"/>
          <circle cx="75" cy="70" r="5" fill="white"/>
          <circle cx="125" cy="70" r="5" fill="white"/>
          <circle cx="85" cy="90" r="5" fill="white"/>
          <circle cx="100" cy="90" r="5" fill="white"/>
          <circle cx="115" cy="90" r="5" fill="white"/>
          <line x1="100" y1="70" x2="85" y2="50" stroke="white" stroke-width="3"/>
          <line x1="100" y1="70" x2="100" y2="50" stroke="white" stroke-width="3"/>
          <line x1="100" y1="70" x2="115" y2="50" stroke="white" stroke-width="3"/>
          <line x1="100" y1="70" x2="75" y2="70" stroke="white" stroke-width="3"/>
          <line x1="100" y1="70" x2="125" y2="70" stroke="white" stroke-width="3"/>
          <line x1="100" y1="70" x2="85" y2="90" stroke="white" stroke-width="3"/>
          <line x1="100" y1="70" x2="100" y2="90" stroke="white" stroke-width="3"/>
          <line x1="100" y1="70" x2="115" y2="90" stroke="white" stroke-width="3"/>
        </svg>
        <div class="header-logo-text">
          <span class="human">HUMAN</span><span class="layers">LAYERS</span>
        </div>
      </div>
      <nav class="space-x-6 text-xs uppercase font-light tracking-wider">
        <a href="#" class="nav-link hover:text-green-400 transition-colors">Home</a>
        <a href="#" class="nav-link hover:text-green-400 transition-colors">Services</a>
        <a href="#" class="nav-link hover:text-green-400 transition-colors">Portfolio</a>
        <a href="#" class="nav-link hover:text-green-400 transition-colors">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main-content" class="min-h-screen relative flex items-center justify-center flex-grow">
    <div id="full-video-background">
      <video autoplay loop muted playsinline>
        <source src="walking.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="overlay"></div>
    </div>
    
    <div class="absolute inset-0 flex flex-col items-center justify-center z-10">
      <div class="text-center p-4">
        <p class="text-white text-shadow-strong tracking-tight">
          <span id="static-intro-text" class="text-5xl md:text-7xl font-light font-space">Crafting prompts for </span>
          <span id="dynamic-industry-span" class="text-5xl md:text-7xl font-extrabold uppercase font-orbitron text-green-400">
          </span>
        </p>
      </div>
      <button id="replay-button" class="mt-8 bg-transparent text-white text-sm font-normal font-orbitron hidden transition-colors duration-200 focus:outline-none flex items-center space-x-2 px-4 py-2 rounded-full border-2 border-green-500 hover:border-green-400 hover:bg-green-500/10">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 0020 13a8 8 0 00-15.356-2m0 0v5h.581m-.04-5.325a.75.75 0 111.04-1.135A10.001 10.001 0 0122 13c0 5.523-4.477 10-10 10S2 18.523 2 13a10.001 10.001 0 01.356-5.325m0 0a.75.75 0 11-1.04-1.135"></path>
        </svg>
        <span>REPLAY</span>
      </button>
    </div>
  </main>

  <footer class="w-full bg-black/60 backdrop-blur text-center py-4 text-sm text-gray-400 z-30 border-t border-green-500/20">
    <div class="font-orbitron text-xs tracking-wider">
      ENGINEERED WITH PRECISION BY <span class="text-green-400 font-bold">HUMANLAYERS</span>
    </div>
    <span class="text-xs text-gray-500 mt-1 block">Trademark &trade; HumanLayers 2024. All rights reserved.</span>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const introOverlay = document.getElementById('intro-overlay');
      const introLogo = introOverlay.querySelector('.intro-logo'); 
      const introText = introOverlay.querySelector('.intro-text');

      setTimeout(() => { 
        introOverlay.classList.add('hidden'); 
        if (introLogo) {
          introLogo.style.transform = 'scale(10)'; 
          introLogo.style.opacity = '0'; 
        }
        if (introText) {
          introText.style.transform = 'scale(10)'; 
          introText.style.opacity = '0'; 
        }
      }, 1200); 

      introOverlay.addEventListener('transitionend', () => {
        introOverlay.style.display = 'none';
        document.body.style.overflowY = 'auto'; 
      });

      const dynamicIndustrySpanEl = document.getElementById('dynamic-industry-span');
      const replayButtonEl = document.getElementById('replay-button'); 
      
      const industries = [
        "AI ASSISTANTS",
        "CHATBOTS",
        "CONTENT CREATION",
        "DATA ANALYSIS",
        "CODE GENERATION",
        "CUSTOMER SERVICE",
        "RESEARCH",
        "EDUCATION",
        "MARKETING",
        "YOUR VISION"
      ];
      let currentIndustryIndex = 0;
      let intervalId; 

      function updateIndustryText() {
        const currentIndustry = industries[currentIndustryIndex];
        dynamicIndustrySpanEl.textContent = currentIndustry;
        
        if (currentIndustryIndex === industries.length - 1) {
          clearInterval(intervalId); 
          replayButtonEl.classList.remove('hidden'); 
        }

        currentIndustryIndex = (currentIndustryIndex + 1) % industries.length;
      }

      replayButtonEl.addEventListener('click', () => {
        replayButtonEl.classList.add('hidden'); 
        currentIndustryIndex = 0; 
        updateIndustryText(); 
        intervalId = setInterval(updateIndustryText, 1500); 
      });

      updateIndustryText(); 
      intervalId = setInterval(updateIndustryText, 1500); 
    });
  </script>
</body>
</html>
