<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prompt Lab - HumanLayers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: 'Inter', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; background-color: #000 }
    .font-orbitron { font-family: 'Orbitron', sans-serif }
    .font-space { font-family: 'Space Grotesk', sans-serif }
    .nav-link { position: relative; font-family: 'Orbitron', sans-serif; letter-spacing: .1em }
    .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background-color: #4ade80; transition: width .3s ease }
    .nav-link:hover::after { width: 100% }
    .header-logo { display: flex; align-items: center; gap: .75rem }
    .header-logo-icon { width: 40px; height: 40px; filter: drop-shadow(0 0 10px rgba(74,222,128,.3)) }
    .header-logo-text { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; color: #fff; letter-spacing: .05em }
    .header-logo-text .human { font-weight: 900 }
    .header-logo-text .layers { font-weight: 400; letter-spacing: .15em }
    .prompt-container { background: linear-gradient(135deg, rgba(74,222,128,.05) 0%, rgba(0,0,0,.9) 100%); border: 1px solid rgba(74,222,128,.3); border-radius: 1rem; padding: 2rem; backdrop-filter: blur(10px) }
    .input-field { background: rgba(0,0,0,.5); border: 1px solid rgba(74,222,128,.3); color: #fff; padding: .75rem 1rem; border-radius: .5rem; width: 100%; transition: border-color .3s ease; font-family: 'Space Grotesk', sans-serif }
    .input-field:focus { outline: none; border-color: #4ade80; box-shadow: 0 0 20px rgba(74,222,128,.2) }
    .textarea-field { min-height: 150px; resize: vertical; font-family: 'Space Grotesk', sans-serif }
    .optimize-button { background: linear-gradient(135deg,#4ade80 0%,#22c55e 100%); color: #000; font-family: 'Orbitron', sans-serif; font-weight: 900; padding: 1rem 2rem; border-radius: .5rem; border: none; cursor: pointer; transition: all .3s ease; text-transform: uppercase; letter-spacing: .1em; box-shadow: 0 0 30px rgba(74,222,128,.3) }
    .optimize-button:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(74,222,128,.5) }
    .optimize-button:disabled { opacity: .5; cursor: not-allowed; transform: none }
    .result-box { background: rgba(74,222,128,.05); border: 1px solid rgba(74,222,128,.3); border-radius: .5rem; padding: 1.5rem; margin-top: 1rem; animation: slideIn .5s ease-out }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px) } to { opacity: 1; transform: translateY(0) } }
    .loading-spinner { border: 3px solid rgba(74,222,128,.1); border-top: 3px solid #4ade80; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 2rem auto }
    @keyframes spin { 0% { transform: rotate(0) } 100% { transform: rotate(360deg) } }
    .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem }
    @media (max-width: 768px) { .comparison-grid { grid-template-columns: 1fr } }
    .copy-button { background: transparent; border: 1px solid rgba(74,222,128,.5); color: #4ade80; padding: .5rem 1rem; border-radius: .25rem; cursor: pointer; transition: all .3s ease; font-family: 'Orbitron', sans-serif; font-size: .75rem; text-transform: uppercase; letter-spacing: .1em }
    .copy-button:hover { background: rgba(74,222,128,.1); border-color: #4ade80 }
    .error-box { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.3); color: #fecaca; border-radius: .5rem; padding: 1rem; margin-top: 1rem; font-family: 'Space Grotesk', sans-serif }
  </style>
</head>
<body class="bg-black text-white">

  <header class="fixed top-0 left-0 w-full bg-black/80 backdrop-blur z-40 border-b border-green-500/20">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="header-logo">
        <svg class="header-logo-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <rect x="70" y="40" width="60" height="100" rx="30" fill="#4ade80"/>
          <circle cx="100" cy="70" r="8" fill="white"/>
          <circle cx="85" cy="50" r="5" fill="white"/>
          <circle cx="100" cy="50" r="5" fill="white"/>
          <circle cx="115" cy="50" r="5" fill="white"/>
          <circle cx="75" cy="70" r="5" fill="white"/>
          <circle cx="125" cy="70" r="5" fill="white"/>
          <circle cx="85" cy="90" r="5" fill="white"/>
          <circle cx="100" cy="90" r="5" fill="white"/>
          <circle cx="115" cy="90" r="5" fill="white"/>
        </svg>
        <div class="header-logo-text">
          <span class="human">HUMAN</span><span class="layers">LAYERS</span>
        </div>
      </a>
      <nav class="space-x-6 text-xs uppercase font-light tracking-wider">
        <a href="index.html" class="nav-link hover:text-green-400 transition-colors">Home</a>
        <a href="aboutus.html" class="nav-link hover:text-green-400 transition-colors">About</a>
        <a href="prompt.html" class="nav-link hover:text-green-400 transition-colors text-green-400">Prompt Lab</a>
      </nav>
    </div>
  </header>

  <main class="flex-grow pt-24 pb-12">
    <div class="max-w-5xl mx-auto px-6">
      <div class="text-center mb-12">
        <h1 class="text-5xl font-orbitron font-bold text-green-400 mb-4">PROMPT LAB</h1>
        <p class="text-xl text-gray-300 font-space max-w-2xl mx-auto">
          Transform your prompts with AI-powered optimization. Get instant improvements and expert refinements.
        </p>
      </div>

      <div class="prompt-container mb-8">
        <div class="mb-6">
          <label class="block text-sm font-orbitron text-green-400 mb-2 uppercase tracking-wider">Your Original Prompt</label>
          <textarea id="original-prompt" class="input-field textarea-field" placeholder="Enter your prompt here..."></textarea>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-orbitron text-green-400 mb-2 uppercase tracking-wider">Use Case (Optional)</label>
          <select id="use-case" class="input-field">
            <option value="">Select...</option>
            <option value="content">Content Creation</option>
            <option value="coding">Code Generation</option>
            <option value="analysis">Data Analysis</option>
            <option value="creative">Creative Writing</option>
            <option value="research">Research</option>
            <option value="customer">Customer Service</option>
            <option value="marketing">Marketing</option>
            <option value="education">Education</option>
          </select>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-orbitron text-green-400 mb-2 uppercase tracking-wider">Target AI Model</label>
          <select id="ai-model" class="input-field">
            <option value="gemini">Gemini</option>
          </select>
        </div>

        <button id="optimize-btn" class="optimize-button w-full">OPTIMIZE MY PROMPT</button>
      </div>

      <div id="loading" class="hidden">
        <div class="loading-spinner"></div>
        <p class="text-center text-green-400 font-orbitron">Optimizing your prompt...</p>
      </div>

      <div id="error" class="hidden error-box"></div>

      <div id="results" class="hidden">
        <div class="comparison-grid">
          <div class="result-box">
            <div class="flex justify-between items-center mb-3">
              <h3 class="font-orbitron font-bold text-gray-400 uppercase text-sm">Original</h3>
              <button class="copy-button" onclick="copyToClipboard('original-result')">Copy</button>
            </div>
            <div id="original-result" class="text-gray-300 font-space leading-relaxed"></div>
          </div>

          <div class="result-box">
            <div class="flex justify-between items-center mb-3">
              <h3 class="font-orbitron font-bold text-green-400 uppercase text-sm">Optimized</h3>
              <button class="copy-button" onclick="copyToClipboard('optimized-result')">Copy</button>
            </div>
            <div id="optimized-result" class="text-white font-space leading-relaxed"></div>
          </div>
        </div>

        <div class="result-box mt-4">
          <h3 class="font-orbitron font-bold text-green-400 mb-3 uppercase text-sm">Key Improvements</h3>
          <ul id="improvements-list" class="space-y-2 text-gray-300"></ul>
        </div>

        <div class="result-box mt-4">
          <h3 class="font-orbitron font-bold text-green-400 mb-3 uppercase text-sm">💡 Pro Tips</h3>
          <div id="tips-list" class="text-gray-300 space-y-2"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="w-full bg-black/60 backdrop-blur text-center py-4 text-sm text-gray-400 border-t border-green-500/20">
    <div class="font-orbitron text-xs tracking-wider">
      ENGINEERED BY <span class="text-green-400 font-bold">HUMANLAYERS</span>
    </div>
  </footer>

  <script>
    const API_KEY = "AIzaSyCAUrGpouxvhZpjz6okI3mqiBNH46_DJNE";
    // Correct endpoint (your 404 came from using an old/invalid model path)
    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

    const optimizeBtn = document.getElementById("optimize-btn");
    const originalPromptEl = document.getElementById("original-prompt");
    const loadingEl = document.getElementById("loading");
    const resultsEl = document.getElementById("results");
    const errorEl = document.getElementById("error");

    optimizeBtn.addEventListener("click", async () => {
      const prompt = originalPromptEl.value.trim();
      const useCase = document.getElementById("use-case").value;
      const aiModel = document.getElementById("ai-model").value;

      if (!prompt) {
        alert("Please enter a prompt to optimize!");
        return;
      }

      // UI state
      loadingEl.classList.remove("hidden");
      resultsEl.classList.add("hidden");
      errorEl.classList.add("hidden");
      errorEl.textContent = "";
      optimizeBtn.disabled = true;

      try {
        const payload = {
          contents: [
            {
              parts: [
                {
                  text:
`You are a prompt engineering expert. Optimize this prompt for better AI responses.

Original Prompt: "${prompt}"
${useCase ? `Use Case: ${useCase}` : ""}
${aiModel ? `Target Model: ${aiModel}` : ""}

Provide:
1. An optimized version of the prompt
2. A list of 3–5 specific improvements made
3. 2–3 pro tips for this type of prompt

Format your response as strict JSON:
{
  "optimized": "the improved prompt",
  "improvements": ["improvement 1", "improvement 2"],
  "tips": ["tip 1", "tip 2"]
}`
                }
              ]
            }
          ],
          generationConfig: { temperature: 0.7, maxOutputTokens: 800 }
        };

        const resp = await fetch(GEMINI_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        // If HTTP not OK, surface the body text to the UI
        if (!resp.ok) {
          const text = await resp.text();
          throw new Error(`HTTP ${resp.status}: ${text}`);
        }

        const data = await resp.json();
        console.log("Gemini response:", data);

        // Handle safety or empty candidates gracefully
        const first = data?.candidates?.[0];
        const contentText = first?.content?.parts?.[0]?.text;

        if (!contentText) {
          // Safety block or empty response; show a meaningful message
          const safety = data?.promptFeedback?.blockReason || first?.safetyRatings?.map(r => r.category).join(", ");
          throw new Error(safety ? `Response blocked by safety: ${safety}` : "No content returned from model.");
        }

        // Extract JSON object from text (in case the model adds prose)
        const jsonMatch = contentText.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error("Model did not return JSON in the expected format.");

        const result = JSON.parse(jsonMatch[0]);
        displayResults(prompt, result);

      } catch (err) {
        console.error(err);
        errorEl.textContent = `Error: ${err.message}`;
        errorEl.classList.remove("hidden");
      } finally {
        loadingEl.classList.add("hidden");
        optimizeBtn.disabled = false;
      }
    });

    function displayResults(original, result) {
      document.getElementById("original-result").textContent = original;
      document.getElementById("optimized-result").textContent = result.optimized || "";

      const improvements = Array.isArray(result.improvements) ? result.improvements : [];
      const tips = Array.isArray(result.tips) ? result.tips : [];

      document.getElementById("improvements-list").innerHTML =
        improvements.map((imp) => `<li class="flex items-start"><span class="text-green-400 mr-2">✓</span>${imp}</li>`).join("");

      document.getElementById("tips-list").innerHTML =
        tips.map((tip) => `<p class="mb-2">${tip}</p>`).join("");

      document.getElementById("results").classList.remove("hidden");
      document.getElementById("results").scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function copyToClipboard(elementId) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = originalText; }, 2000);
      });
    }
  </script>
</body>
</html>
