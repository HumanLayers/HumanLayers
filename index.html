<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HumanLayers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #000;
    }

    /* INTRO ANIMATION */
    #intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000;
      z-index: 50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      transition: opacity 1.4s ease-out;
    }
    #intro-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .intro-logo {
      width: 180px;
      height: auto;
      opacity: 1;
      transform: scale(1);
      animation: introPop 1.6s ease-out forwards;
      filter: drop-shadow(0 0 25px rgba(74, 222, 128, 0.5));
    }

    @keyframes introPop {
      0% { transform: scale(0.2); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); }
    }

    .intro-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: white;
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeIn 1.2s ease-out forwards;
      animation-delay: 0.6s;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* HEADER */
    .nav-link {
      position: relative;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.1em;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background-color: #4ade80;
      transition: width 0.3s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .header-logo-icon {
      width: 40px;
      height: 40px;
    }
    .header-logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
    }
    .header-logo-text .human { font-weight: 900; }
    .header-logo-text .layers { font-weight: 400; letter-spacing: 0.15em; }

    /* VIDEO BG */
    #full-video-background video {
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    #full-video-background .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.7);
    }

    .text-shadow-strong {
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
    }
  </style>
</head>

<body class="bg-black text-white">

  <!-- INTRO OVERLAY WITH logo.png -->
  <div id="intro-overlay">
    <img src="logo.png" class="intro-logo" alt="HumanLayers Logo" />
    <div class="intro-text">HUMANLAYERS</div>
  </div>

  <!-- HEADER -->
  <header class="fixed top-0 left-0 w-full bg-transparent z-40">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="header-logo">
        <img src="logo.png" class="header-logo-icon" />
        <div class="header-logo-text">
          <span class="human">HUMAN</span><span class="layers">LAYERS</span>
        </div>
      </div>

      <nav class="space-x-6 text-xs uppercase font-light tracking-wider">
        <a href="index.html" class="nav-link hover:text-green-400">Home</a>
        <a href="aboutus.html" class="nav-link hover:text-green-400">About</a>
        <a href="prompt.html" class="nav-link hover:text-green-400">Prompt Lab</a>
      </nav>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="min-h-screen relative flex items-center justify-center flex-grow">

    <!-- VIDEO BACKGROUND -->
    <div id="full-video-background">
      <video autoplay loop muted playsinline>
        <source src="walking.mp4" type="video/mp4" />
      </video>
      <div class="overlay"></div>
    </div>

    <div class="absolute inset-0 flex flex-col items-center justify-center z-10">
      <div class="text-center p-4">
        <p class="text-white text-shadow-strong tracking-tight">
          <span class="text-5xl md:text-7xl font-light font-space">Crafting prompts for </span>
          <span id="dynamic-industry-span" class="text-5xl md:text-7xl font-extrabold uppercase font-orbitron text-green-400"></span>
        </p>
      </div>

      <button id="replay-button" class="mt-8 bg-transparent text-white text-sm font-normal font-orbitron hidden transition-colors duration-200 px-4 py-2 rounded-full border-2 border-green-500 hover:border-green-400 hover:bg-green-500/10">
        REPLAY
      </button>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="w-full bg-black/60 backdrop-blur text-center py-4 text-sm text-gray-400 z-30 border-t border-green-500/20">
    <div class="font-orbitron text-xs tracking-wider">
      ENGINEERED WITH PRECISION BY <span class="text-green-400 font-bold">HUMANLAYERS</span>
    </div>
    <span class="text-xs text-gray-500 mt-1 block">Trademark ™ HumanLayers 2024. All rights reserved.</span>
  </footer>

  <script>
    // INTRO ANIMATION REMOVE
    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        document.getElementById("intro-overlay").classList.add("hidden");
      }, 1600);
    });

    // INDUSTRY TEXT ROTATOR
    const industries = [
      "AI ASSISTANTS",
      "CHATBOTS",
      "CONTENT CREATION",
      "DATA ANALYSIS",
      "CODE GENERATION",
      "CUSTOMER SERVICE",
      "RESEARCH",
      "EDUCATION",
      "MARKETING",
      "YOUR VISION",
    ];

    let i = 0;
    const span = document.getElementById("dynamic-industry-span");
    const replay = document.getElementById("replay-button");
    let interval;

    function update() {
      span.textContent = industries[i];
      if (i === industries.length - 1) {
        clearInterval(interval);
        replay.classList.remove("hidden");
      }
      i = (i + 1) % industries.length;
    }

    replay.addEventListener("click", () => {
      i = 0;
      replay.classList.add("hidden");
      update();
      interval = setInterval(update, 1500);
    });

    update();
    interval = setInterval(update, 1500);
  </script>

</body>
</html>
