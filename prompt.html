<!-- PROMPT LAB UPDATED WITH GEMINI API PROXY ENDPOINT -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Lab - HumanLayers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #000;
      color: white;
    }
    .prompt-container {
      background: rgba(74, 222, 128, 0.03);
      border: 1px solid rgba(74, 222, 128, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      padding: 2rem;
    }
    .input-field {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(74, 222, 128, 0.3);
      padding: 0.75rem;
      width: 100%;
      border-radius: 0.5rem;
      color: white;
    }
    .textarea-field {
      min-height: 150px;
      resize: vertical;
    }
    .btn {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      padding: 1rem;
      width: 100%;
      text-align: center;
      color: black;
      border-radius: 0.5rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      margin-top: 1rem;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    .result-box {
      background: rgba(74, 222, 128, 0.08);
      border: 1px solid rgba(74, 222, 128, 0.3);
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
    }
    .error-box {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.4);
      color: #ff9c9c;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1.5rem;
    }
  </style>
</head>

<body>
  <header class="fixed top-0 left-0 bg-black/80 w-full backdrop-blur border-b border-green-500/20 z-40 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-6">
      <a href="index.html" class="flex items-center gap-3">
        <img src="logo.png" width="40" />
        <div class="font-orbitron text-xl font-extrabold">HUMAN<span class="text-green-400">LAYERS</span></div>
      </a>

      <nav class="space-x-6 font-orbitron text-xs uppercase tracking-wider">
        <a href="index.html" class="hover:text-green-400">Home</a>
        <a href="aboutus.html" class="hover:text-green-400">About</a>
        <a href="prompt.html" class="text-green-400">Prompt Lab</a>
      </nav>
    </div>
  </header>

  <main class="pt-28 pb-20 max-w-4xl mx-auto px-6">
    <h1 class="text-5xl font-orbitron font-bold text-green-400 text-center mb-8">PROMPT LAB</h1>

    <div class="prompt-container">
      <label class="font-orbitron text-green-400 text-sm tracking-wider uppercase">Your Original Prompt</label>
      <textarea id="inputPrompt" class="input-field textarea-field mt-2" placeholder="Enter your prompt..."></textarea>

      <label class="font-orbitron text-green-400 text-sm tracking-wider uppercase mt-6 block">Use Case</label>
      <select id="useCase" class="input-field mt-2">
        <option value="">General</option>
        <option value="content">Content Creation</option>
        <option value="code">Coding</option>
        <option value="analysis">Analysis</option>
      </select>

      <button id="runBtn" class="btn">OPTIMIZE MY PROMPT</button>
    </div>

    <div id="errorBox" class="error-box hidden"></div>

    <div id="results" class="hidden">
      <div class="result-box">
        <h2 class="font-orbitron text-green-400 mb-2">Optimized Prompt</h2>
        <div id="optimizedText" class="text-gray-200"></div>
      </div>

      <div class="result-box">
        <h2 class="font-orbitron text-green-400 mb-2">Improvements</h2>
        <ul id="improvementsList" class="space-y-1 text-gray-300"></ul>
      </div>

      <div class="result-box">
        <h2 class="font-orbitron text-green-400 mb-2">Tips</h2>
        <ul id="tipsList" class="space-y-1 text-gray-300"></ul>
      </div>
    </div>
  </main>

<script>
// === DIRECT GEMINI API CALL (for testing only) ===
// IMPORTANT: This exposes the key — ONLY for temporary testing.
// Replace with backend proxy later.
const API_KEY = "AIzaSyCAUrGpouxvhZpjz6okI3mqiBNH46_DJNE";
const MODEL = "gemini-pro";

const runBtn = document.getElementById("runBtn");
const errorBox = document.getElementById("errorBox");
const results = document.getElementById("results");

runBtn.addEventListener("click", async () => {
  const prompt = document.getElementById("inputPrompt").value.trim();
  const useCase = document.getElementById("useCase").value;

  if (!prompt) {
    alert("Enter a prompt!");
    return;
  }

  errorBox.classList.add("hidden");
  results.classList.add("hidden");

  try {
    const body = {
      contents: [
        {
          parts: [
            {
              text: `You are a prompt engineering specialist. Improve this prompt.

Original: "${prompt}"
Use Case: ${useCase}

Return JSON:
{
  "optimized": "...",
  "improvements": ["..."],
  "tips": ["..."]
}`,
            },
          ],
        },
      ],
    };

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      }
    );

    const data = await response.json();
    console.log(data);

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error("No response from model");

    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("Model returned non-JSON format");

    const result = JSON.parse(jsonMatch[0]);

    document.getElementById("optimizedText").textContent = result.optimized;
    document.getElementById("improvementsList").innerHTML = result.improvements
      .map((i) => `<li>• ${i}</li>`)
